<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZProject — Mini Apps</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 48px 20px;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 28px;
      }
      p.sub {
        margin: 0 0 32px;
        color: #94a3b8;
      }
      .grid {
        width: 100%;
        max-width: 520px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      a.card {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 18px 20px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 14px;
        text-decoration: none;
        color: inherit;
        transition: border-color 0.15s, transform 0.05s;
      }
      a.card:hover {
        border-color: #6366f1;
      }
      a.card:active {
        transform: scale(0.99);
      }
      .emoji {
        font-size: 26px;
      }
      .meta h2 {
        margin: 0;
        font-size: 17px;
      }
      .meta span {
        font-size: 13px;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <h1>ZProject</h1>
    <p class="sub">A collection of small offline-first apps.</p>
    <div class="grid">
      <a class="card" href="./expense-tracker/">
        <span class="emoji">🌱</span>
        <div class="meta">
          <h2>Kaizen</h2>
          <span>Offline-first personal hub — expenses, planning &amp; notes (PWA)</span>
        </div>
      </a>
      <!-- Add a new <a class="card" href="./<project>/"> entry per project. -->
    </div>
  </body>
</html>
