name: Deploy to GitHub Pages

# Builds EVERY mini-project in this repo (any top-level folder that has a
# package.json) and publishes each one to its own sub-path:
#   https://<user>.github.io/<repo>/<project>/
# A landing page at the repo root (index.html) is served at:
#   https://<user>.github.io/<repo>/
#
# Adding a new project later requires NO changes to this file — just drop a new
# folder with its own package.json + `npm run build` that outputs to ./dist.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # Don't cancel an in-progress deploy when a new one queues — cancelling a live
  # Pages deployment can leave the previous run's `deploy-pages` step failing.
  # Let each deployment finish; the newest push still ends up published last.
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build all projects
        run: |
          set -e
          REPO="${{ github.event.repository.name }}"
          mkdir -p _site

          # Copy a committed landing page (and any root static assets) if present.
          [ -f index.html ] && cp index.html _site/index.html || true

          for pkg in */package.json; do
            name="$(dirname "$pkg")"
            # Public sub-path (the URL). Normally the folder name, but PINNED for
            # folders that were renamed, so already-installed PWAs / bookmarks and
            # their on-device (per-origin) data keep working at the old URL.
            subpath="$name"
            case "$name" in
              kaizen) subpath="expense-tracker" ;;
            esac
            echo "::group::Building $name -> /$REPO/$subpath/"
            (
              cd "$name"
              npm ci
              # Each project is served from /<repo>/<subpath>/ on GitHub Pages.
              VITE_BASE="/$REPO/$subpath/" npm run build
            )
            mkdir -p "_site/$subpath"
            cp -r "$name/dist/." "_site/$subpath/"
            echo "::endgroup::"
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      # `actions/deploy-pages` intermittently fails on GitHub's side (a transient
      # API error, not a build problem). Try up to three times so a flaky publish
      # doesn't strand users on the previous version.
      - id: deploy_try1
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - id: deploy_try2
        if: steps.deploy_try1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - id: deploy_try3
        if: steps.deploy_try1.outcome == 'failure' && steps.deploy_try2.outcome == 'failure'
        uses: actions/deploy-pages@v4
